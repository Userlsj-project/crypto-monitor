<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crypto Monitor{% endblock %}</title>

    <!-- Bootstrap 5 다크 테마 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* ─── 전역 스타일 (다크 테마) ─── */
        :root {
            --bs-body-bg: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-yellow: #d29922;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bs-body-bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ─── 네비게이션 바 ─── */
        .navbar {
            background: linear-gradient(90deg, #0d1117 0%, #161b22 100%) !important;
            border-bottom: 1px solid var(--card-border);
            padding: 12px 0;
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
            letter-spacing: -0.5px;
        }

        .nav-link {
            color: #cdd9e5 !important;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--accent-blue) !important;
        }

        /* ─── 카드 스타일 ─── */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        /* ─── 가격 색상 ─── */
        .price-up { color: var(--accent-green); }
        .price-down { color: var(--accent-red); }
        .price-neutral { color: var(--text-muted); }

        /* ─── 뱃지 스타일 ─── */
        .badge-up {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .badge-down {
            background-color: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        /* ─── 로딩 스피너 ─── */
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--card-border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── 페이지 헤더 ─── */
        .page-header {
            padding: 2rem 0 1.5rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e6edf3;
        }

        /* ─── 테이블 스타일 ─── */
        .table {
            --bs-table-bg: transparent;
            --bs-table-border-color: var(--card-border);
        }

        .table thead th {
            background-color: #21262d;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
        }

        /* ─── AI 분석 박스 ─── */
        .ai-analysis-box {
            background: linear-gradient(135deg, #0d1117 0%, #1c2128 100%);
            border: 1px solid #388bfd33;
            border-radius: 10px;
            padding: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #cdd9e5;
        }

        /* ─── 상태 표시 점 ─── */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.active {
            background-color: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-dot.inactive {
            background-color: var(--text-muted);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ─── 스크롤바 스타일 ─── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bs-body-bg); }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* ─── 반응형 ─── */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.4rem; }
            .navbar-brand { font-size: 1.1rem; }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- ─── 네비게이션 바 ─── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-4">
        <!-- 브랜드 로고 -->
        <a class="navbar-brand" href="/">
            <i class="bi bi-graph-up-arrow me-2"></i>Crypto Monitor
        </a>

        <!-- 모바일 토글 버튼 -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- 네비게이션 링크 -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                        <i class="bi bi-speedometer2 me-1"></i>대시보드
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/alerts' in request.path %}active{% endif %}" href="/alerts/">
                        <i class="bi bi-bell me-1"></i>알림 관리
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/ai-analysis' in request.path %}active{% endif %}" href="/ai-analysis/">
                        <i class="bi bi-robot me-1"></i>AI 분석
                    </a>
                </li>
            </ul>

            <!-- 우측 외부 링크 -->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="http://localhost:3000" target="_blank">
                        <i class="bi bi-bar-chart-line me-1"></i>Grafana
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="http://localhost:5678" target="_blank">
                        <i class="bi bi-diagram-3 me-1"></i>n8n
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/" target="_blank">
                        <i class="bi bi-gear me-1"></i>Admin
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ─── 메인 콘텐츠 ─── -->
<main class="container-fluid px-4 py-3">
    {% block content %}{% endblock %}
</main>

<!-- ─── 푸터 ─── -->
<footer class="text-center py-4 mt-4" style="border-top: 1px solid var(--card-border); color: var(--text-muted);">
    <small>
        <i class="bi bi-graph-up-arrow me-1"></i>
        Crypto Monitor | Django + Celery + EXAONE 3.5 (Ollama) + Grafana
        <span class="ms-3" id="footer-time"></span>
    </small>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 현재 시간 표시
    function updateTime() {
        const now = new Date();
        document.getElementById('footer-time').textContent = now.toLocaleString('ko-KR');
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
