apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: crypto_postgres
    type: postgres
    url: postgres:5432
    database: crypto_monitor
    user: ${POSTGRES_USER:-crypto_user}
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-crypto_password}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1500       # PostgreSQL 15
      timescaledb: false
    isDefault: true
    editable: true
